apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend-api
configMapGenerator:
  - name: app-config
    namespace: microservices
    behavior: merge
    literals:
      - environment=development
      - log_level=debug

