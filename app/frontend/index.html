<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K8s DevOps Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header .logo { width: 36px; height: 36px; background: linear-gradient(135deg, #1a6fbf, #0d4f8a); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
    header .badge { margin-left: auto; background: #1a6fbf22; border: 1px solid #1a6fbf55; color: #58a6ff; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; }
    .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #7d8590; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card-value { font-size: 28px; font-weight: 700; color: #e6edf3; }
    .card-sub { font-size: 13px; color: #7d8590; margin-top: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; animation: pulse 2s ease-in-out infinite; }
    .dot.green { background: #3fb950; }
    .dot.blue  { background: #58a6ff; }
    .dot.yellow{ background: #d29922; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .pod-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .pod-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #0d1117; border: 1px solid #21262d; border-radius: 8px; font-size: 13px; }
    .pod-name { flex: 1; font-family: monospace; color: #58a6ff; }
    .pod-status { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .pod-status.running { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #e6edf3; display: flex; align-items: center; gap: 10px; }
    .task-input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .task-input-row input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e6edf3; font-size: 14px; outline: none; transition: border-color .2s; }
    .task-input-row input:focus { border-color: #1a6fbf; }
    .btn { background: #1a6fbf; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn:hover { background: #1557a0; }
    .btn.sm { padding: 5px 12px; font-size: 12px; }
    .btn.danger { background: #da3633; }
    .btn.danger:hover { background: #b91c1c; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; transition: border-color .2s; }
    .task-item:hover { border-color: #58a6ff44; }
    .task-item.done .task-text { text-decoration: line-through; color: #7d8590; }
    .task-text { flex: 1; font-size: 14px; }
    .checkbox { width: 18px; height: 18px; border: 2px solid #30363d; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
    .checkbox.checked { background: #1a6fbf; border-color: #1a6fbf; }
    .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; }
    .api-box { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; color: #3fb950; margin-top: 12px; min-height: 80px; white-space: pre-wrap; }
    .loading { color: #7d8590; font-size: 13px; }
    .error { color: #f85149; font-size: 13px; }
  </style>
</head>
<body>
<header>
  <div class="logo">⎈</div>
  <h1>K8s DevOps Dashboard</h1>
  <span class="badge" id="env-badge">Loading...</span>
</header>
<main>
  <div class="grid">
    <div class="card">
      <div class="card-title"><span class="dot green"></span> API Status</div>
      <div class="card-value" id="api-status">—</div>
      <div class="card-sub" id="api-pod">Checking...</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot blue"></span> Pod Hostname</div>
      <div class="card-value" id="pod-hostname" style="font-size:16px;font-family:monospace;margin-top:8px">—</div>
      <div class="card-sub">Kubernetes assigns each pod a unique name</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot green"></span> Simulated Pods</div>
      <div class="pod-grid" id="pod-list"><div class="loading">Loading pods...</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot yellow"></span> Live API Response</div>
      <div class="api-box" id="api-raw">Fetching...</div>
    </div>
  </div>
  <div class="card">
    <div class="section-title">📋 DevOps Task Tracker <span style="font-size:12px;color:#7d8590;font-weight:400">(backed by real REST API)</span></div>
    <div class="task-input-row">
      <input id="task-input" type="text" placeholder="Add a new DevOps task..." />
      <button class="btn" onclick="addTask()">Add Task</button>
    </div>
    <div class="task-list" id="task-list"><div class="loading">Loading tasks...</div></div>
  </div>
</main>
<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8080' : '';
  async function fetchInfo() {
    try {
      const res = await fetch(`${API}/api/info`);
      const data = await res.json();
      document.getElementById('api-status').textContent = 'Connected ✓';
      document.getElementById('api-status').style.color = '#3fb950';
      document.getElementById('api-pod').textContent = `Served by pod: ${data.pod}`;
      document.getElementById('pod-hostname').textContent = data.pod;
      document.getElementById('env-badge').textContent = `env: ${data.environment}`;
      document.getElementById('api-raw').textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      document.getElementById('api-status').textContent = 'Unreachable';
      document.getElementById('api-status').style.color = '#f85149';
      document.getElementById('api-raw').textContent = `Error: ${e.message}`;
      document.getElementById('api-raw').style.color = '#f85149';
    }
  }
  function renderPods() {
    const pods = [
      { name: 'backend-api-7d4f9b-xk2pl', status: 'running' },
      { name: 'backend-api-7d4f9b-mn8qr', status: 'running' },
      { name: 'backend-api-7d4f9b-zt5ws', status: 'running' },
    ];
    document.getElementById('pod-list').innerHTML = pods.map(p => `
      <div class="pod-item">
        <span class="dot green"></span>
        <span class="pod-name">${p.name}</span>
        <span class="pod-status running">${p.status}</span>
      </div>`).join('');
  }
  async function fetchTasks() {
    try {
      const res = await fetch(`${API}/api/tasks`);
      const tasks = await res.json();
      renderTasks(tasks);
    } catch {
      document.getElementById('task-list').innerHTML = '<div class="error">Could not load tasks</div>';
    }
  }
  function renderTasks(tasks) {
    const el = document.getElementById('task-list');
    if (!tasks.length) { el.innerHTML = '<div class="loading">No tasks yet.</div>'; return; }
    el.innerHTML = tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
        <span class="task-text">${t.title}</span>
        <button class="btn sm danger" onclick="deleteTask(${t.id})">Delete</button>
      </div>`).join('');
  }
  async function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) return;
    await fetch(`${API}/api/tasks`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
    input.value = '';
    fetchTasks();
  }
  async function toggleTask(id) {
    await fetch(`${API}/api/tasks/${id}`, { method: 'PATCH' });
    fetchTasks();
  }
  async function deleteTask(id) {
    await fetch(`${API}/api/tasks/${id}`, { method: 'DELETE' });
    fetchTasks();
  }
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  fetchInfo(); fetchTasks(); renderPods();
  setInterval(fetchInfo, 15000);
</script>
</body>
</html>
